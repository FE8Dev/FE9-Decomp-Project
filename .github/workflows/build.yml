name: Build
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [GFEP01]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Git config
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Download game ISO
      env:
        GAME_ISO_URL: ${{ secrets.GAME_ISO_URL }}
      run: |
        mkdir -p orig/GFEP01
        curl -L "$GAME_ISO_URL" -o orig/GFEP01/FE9.iso

    - name: Extract game ISO
      run: |
        curl -L https://github.com/encounter/decomp-toolkit/releases/download/v1.8.3/dtk-linux-x86_64 -o tools/dtk
        chmod +x tools/dtk
        tools/dtk disc extract orig/GFEP01/FE9.iso orig/GFEP01

    - name: Cache build
      uses: actions/cache@v4
      with:
        path: |
          build
          .ninja_deps
          .ninja_log
        key: ${{ runner.os }}-${{ matrix.version }}-${{ github.sha }}
        restore-keys: ${{ runner.os }}-${{ matrix.version }}-

    - name: Build
      run: |
        python configure.py --version ${{ matrix.version }}
        ninja

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.version }}_report
        path: build/${{ matrix.version }}/report.json